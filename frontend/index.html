<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Connectify AI</title>
  <style>
    body,
    html,
    #root {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    * {
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div id="root">
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f9fafb;">
      <div
        style="width: 3rem; height: 3rem; border-radius: 50%; border: 4px solid #e5e7eb; border-top-color: #3b82f6; animation: spin 1s linear infinite;">
      </div>
      <style>
        @keyframes spin {
          0% {
            transform: rotate(0deg);
          }

          100% {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
